{% extends 'base.html' %}
{% block content %}
<style>
.auth-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.auth-card {
    background: white;
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(124,58,237,0.12);
    border: 1.5px solid #EDE9FE;
    position: relative;
    overflow: hidden;
}
.auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(135deg, #7C3AED, #EC4899, #F59E0B);
}
.auth-logo {
    text-align: center;
    margin-bottom: 32px;
}
.auth-logo img {
    height: 56px;
    width: auto;
    filter: drop-shadow(0 4px 12px rgba(124,58,237,0.3));
}
.auth-title {
    font-size: 26px;
    font-weight: 900;
    color: #111827;
    text-align: center;
    margin-bottom: 6px;
}
.auth-subtitle {
    font-size: 14px;
    color: #9CA3AF;
    text-align: center;
    margin-bottom: 32px;
}
.form-group { margin-bottom: 20px; }
.form-label {
    font-size: 13px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 8px;
    display: block;
}
.form-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #E5E7EB;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #FAFAFA;
    color: #111827;
}
.form-input:focus {
    border-color: #7C3AED;
    box-shadow: 0 0 0 4px rgba(124,58,237,0.1);
    background: white;
}
.form-input::placeholder { color: #D1D5DB; }
.input-icon-wrap { position: relative; }
.input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #9CA3AF;
    font-size: 16px;
}
.input-icon-wrap .form-input { padding-left: 42px; }
.submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7C3AED, #EC4899);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    margin-top: 8px;
}
.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
}
.auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: #6B7280;
}
.auth-footer a {
    color: #7C3AED;
    font-weight: 700;
    text-decoration: none;
}
.auth-footer a:hover { text-decoration: underline; }
.benefits {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
}
.benefit-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #6B7280;
    font-weight: 500;
}
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="校拾淘">
        </div>
        <div class="auth-title">加入校拾淘 🎉</div>
        <div class="auth-subtitle">注册账号，开始交易之旅</div>
        <div class="benefits">
            <div class="benefit-item">✅ 完全免费</div>
            <div class="benefit-item">🔒 安全可靠</div>
            <div class="benefit-item">🎓 校园专属</div>
        </div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="username" class="form-input" placeholder="设置你的用户名" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" class="form-input" placeholder="设置登录密码" required>
                </div>
            </div>
            <button type="submit" class="submit-btn">🚀 免费注册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
