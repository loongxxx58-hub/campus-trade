{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h4 class="fw-bold mb-4 text-center">
                <i class="bi bi-megaphone me-2"></i>发布求购信息
            </h4>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">求购标题</label>
                    <input type="text" name="title" class="form-control" placeholder="例如：求购高数教材第七版" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">详细描述</label>
                    <textarea name="description" class="form-control" rows="4" 
                              placeholder="描述你需要的物品规格、成色要求、联系方式等..." required></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">预算（元，可不填）</label>
                    <div class="input-group">
                        <span class="input-group-text">¥</span>
                        <input type="number" name="budget" class="form-control" 
                               placeholder="不填则显示面议" step="0.01" min="0">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    <i class="bi bi-megaphone me-2"></i>发布求购
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
